{% extends "base.html" %}
{% block content %}
<div class="dashboard-container" style="max-width:1100px; margin:20px auto; padding:20px;">
  <h2 style="text-align:center;">Your AI-Powered Learning Hub</h2>

  <!-- AI Assistant (inbuilt terminal feel) -->
  <section aria-label="AI assistant" style="border:1px solid #ddd; padding:16px; border-radius:10px; margin-bottom:20px;">
    <h3>AI Assistant</h3>
    <div id="ai-output" style="min-height:120px; border:1px dashed #aaa; padding:10px; border-radius:6px; background:#fff;">
      <p>Ask me to open lectures, break down goals, summarize topics, or plan your study.</p>
    </div>
    <div style="margin-top:10px;">
      <input id="nlp-command" placeholder="Type your command here…" style="width:70%; padding:12px; font-family:inherit;">
      <button id="send-command-btn" class="auth-button" style="margin-left:8px;">Send</button>
    </div>
  </section>

  <!-- Mind map placeholder -->
  <section aria-label="Mind map" style="border:1px solid #ddd; padding:16px; border-radius:10px;">
    <h3>Mind Map (visualize goals & tasks)</h3>
    <div id="mindmap-container" style="width:100%; height:420px; background:#fafafa; border:1px solid #ccc; border-radius:6px; display:flex; align-items:center; justify-content:center;">
      <span>Mind map area (jsMind or equivalent would render here)</span>
    </div>
  </section>

  <!-- Quick action: Break down a goal -->
  <section aria-label="Goal breakdown" style="margin-top:20px;">
    <h3>Break Down a Goal</h3>
    <input id="goal-input" placeholder="Enter your big goal…" style="width:60%; padding:12px; font-family:inherit;">
    <button id="breakdown-goal-btn" class="auth-button" style="margin-left:8px;">Break Down</button>
    <div id="breakdown-result" style="margin-top:12px; min-height:40px;"></div>
  </section>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
