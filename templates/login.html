{% extends "base.html" %}
{% block content %}
<div class="login-container" style="max-width: 800px; margin: 40px auto;">
  <h1 style="text-align:center; font-family: 'Open Dyslexic', Arial;">Inclusive Login</h1>

  <section class="login-section biometric-section" aria-label="Biometric login">
    <h2>Biometric</h2>
    <div class="auth-options" style="display:flex; gap:20px; justify-content: center; flex-wrap: wrap;">
      <button id="face-recognition-btn" class="auth-button">Face Recognition</button>
      <button id="touch-id-btn" class="auth-button">Touch ID</button>
    </div>
    <div id="face-preview" class="camera-preview" style="display:none;">
      Camera Preview
    </div>
    <p id="biometric-status" style="text-align:center; color:#555;"></p>
  </section>

  <section class="login-section account-details-section" aria-label="Account details">
    <h2>Account Details</h2>
    <div class="input-group" style="margin-bottom:12px;">
      <label for="name" style="display:block; font-weight:bold;">Name</label>
      <input type="text" id="name" placeholder="Your full name" style="width:100%; padding:12px; font-size:1.1em;">
    </div>
    <div class="input-group" style="margin-bottom:12px;">
      <label for="email" style="display:block; font-weight:bold;">Email</label>
      <input type="email" id="email" placeholder="you@example.com" style="width:100%; padding:12px; font-size:1.1em;">
    </div>
    <div class="input-group disability-selection" style="margin-bottom:12px;">
      <label>Select Disability:</label><br/>
      <input type="radio" id="dyspraxia" name="disability" value="dyspraxia" checked><label for="dyspraxia" style="margin-right:12px;"> Dyspraxia</label>
      <input type="radio" id="hearing" name="disability" value="hearing-impairment"><label for="hearing" style="margin-right:12px;"> Hearing Impairment</label>
      <input type="radio" id="visual" name="disability" value="visually-impaired"><label for="visual" style="margin-right:12px;"> Visually Impaired</label>
      <input type="radio" id="adhd" name="disability" value="adhd"><label for="adhd" style="margin-right:12px;"> ADHD</label>
    </div>

    <button id="send-link-btn" class="auth-button" style="width:100%; font-size:1.2em;">Send Magic Link (No Password)</button>
    <p id="link-status" style="text-align:center; color:#555; margin-top:8px;"></p>
  </section>

  <section class="login-section history-section" id="history-card" style="display:none;">
    <h2>Continue Your Learning</h2>
    <div id="history-content"><p>No recent activity found.</p></div>
    <button id="resume-learning-btn" class="auth-button" style="width:100%; margin-top:10px;">Resume Learning</button>
  </section>
</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
