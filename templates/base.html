<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Inclusive Learning Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Open+Dyslexic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <header>
    <nav aria-label="Breadcrumbs">
      <!-- Simple breadcrumb placeholder; can be populated per page -->
      <span>Home</span> &gt; <span>Dashboard</span>
    </nav>
    <div id="voice-search">
      <button id="voice-search-btn" aria-label="Voice search">🎤</button>
      <input id="global-search-input" placeholder="Search the platform…" />
    </div>
  </header>

  <main role="main">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Simple browser-based voice search; kept generic for all pages
    const voiceBtn = document.getElementById('voice-search-btn');
    const searchInput = document.getElementById('global-search-input');
    if (voiceBtn && searchInput) {
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (Recognition) {
        const rec = new Recognition();
        rec.continuous = false;
        rec.lang = 'en-US';
        rec.interimResults = false;
        voiceBtn.addEventListener('click', () => {
          rec.start();
        });
        rec.onresult = (e) => {
          searchInput.value = e.results[0][0].transcript;
        };
      } else {
        voiceBtn.disabled = true;
      }
    }
  </script>
</body>
</html>
